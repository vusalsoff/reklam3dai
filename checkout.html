<!DOCTYPE html>
<html lang="az">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ReklamAI - Ödəniş</title>
  <!-- Reuse global styles -->
  <link rel="stylesheet" href="css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Manrope:wght@600;800&display=swap" rel="stylesheet">
  <style>
    /* Checkout Specific Styles */
    body {
      background: var(--bg-main);
      color: var(--text-main);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      font-family: 'Inter', sans-serif;
    }
    .checkout-nav {
      padding: 20px 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid var(--panel-border);
      background: var(--panel-bg);
      backdrop-filter: blur(20px);
    }
    .nav-brand {
      text-decoration: none;
      font-size: 24px;
      font-weight: 800;
      color: var(--text-main);
      font-family: 'Manrope', sans-serif;
      display: flex;
      align-items: center;
    }
    .checkout-container {
      display: flex;
      flex-wrap: wrap;
      max-width: 1000px;
      margin: 60px auto;
      gap: 40px;
      padding: 0 20px;
      width: 100%;
    }
    .summary-col, .payment-col {
      flex: 1;
      min-width: 320px;
      background: var(--panel-bg);
      border: 1px solid var(--panel-border);
      border-radius: 24px;
      padding: 40px;
      box-shadow: var(--glass-shadow);
      backdrop-filter: blur(20px);
    }
    .summary-title, .payment-title {
      font-family: 'Manrope', sans-serif;
      font-size: 28px;
      font-weight: 800;
      margin-bottom: 32px;
      color: var(--text-main);
    }
    .summary-item {
      display: flex;
      justify-content: space-between;
      margin-bottom: 20px;
      font-size: 16px;
      color: var(--text-muted);
      font-weight: 500;
    }
    .summary-item strong {
      color: var(--text-main);
      font-weight: 600;
    }
    .summary-total {
      border-top: 1px solid var(--panel-border);
      margin-top: 32px;
      padding-top: 32px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 20px;
      font-weight: 600;
      color: var(--text-main);
    }
    .summary-total span:last-child {
      font-size: 32px;
      font-weight: 800;
      color: var(--primary);
      font-family: 'Manrope', sans-serif;
    }
    .form-group {
      margin-bottom: 24px;
    }
    .form-group label {
      display: block;
      margin-bottom: 10px;
      font-size: 14px;
      color: var(--text-muted);
      font-weight: 500;
    }
    .form-control {
      width: 100%;
      padding: 16px 20px;
      border-radius: 12px;
      border: 1px solid var(--panel-border);
      background: rgba(255, 255, 255, 0.03);
      color: var(--text-main);
      font-family: 'Inter', sans-serif;
      font-size: 16px;
      outline: none;
      transition: all 0.3s ease;
      box-sizing: border-box;
    }
    .form-control:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(109, 40, 217, 0.1);
    }
    .row {
      display: flex;
      gap: 20px;
    }
    .row .form-group {
      flex: 1;
    }
    .btn-pay {
      width: 100%;
      padding: 18px;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 18px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.3s, transform 0.2s;
      margin-top: 10px;
      box-shadow: 0 10px 25px rgba(109, 40, 217, 0.3);
    }
    .btn-pay:hover {
      background: #5b21b6;
      transform: translateY(-2px);
    }
    .secure-badge {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-top: 24px;
      color: var(--text-muted);
      font-size: 14px;
      font-weight: 500;
    }
    
    /* Successful Payment overlay */
    #success-overlay {
      position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
      background: rgba(0,0,0,0.8); backdrop-filter: blur(10px);
      display: none; flex-direction: column; align-items: center; justify-content: center;
      z-index: 10000;
    }
    #success-overlay.active { display: flex; }
    .success-box {
      background: var(--panel-bg);
      padding: 60px 40px; border-radius: 24px; text-align: center;
      border: 1px solid var(--panel-border);
      box-shadow: var(--glass-shadow);
      animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
      max-width: 400px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    @keyframes popIn {
      0% { transform: scale(0.8); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }
  </style>
</head>
<body>

  <!-- Navigation -->
  <nav class="checkout-nav">
    <a href="index.html" class="nav-brand">
      <svg width="32" height="32" viewBox="0 0 48 48" fill="none" style="vertical-align: middle; margin-right:8px;">
        <circle cx="24" cy="24" r="24" fill="var(--primary)" opacity="0.2"/>
        <path d="M14 24 L24 14 V34 Z" fill="var(--primary)" />
        <path d="M24 14 L34 24 L24 34" stroke="var(--secondary)" stroke-width="4" stroke-linejoin="round"/>
      </svg>
      ReklamAI
    </a>
  </nav>

  <div class="checkout-container">
    <!-- Left: Order Summary -->
    <div class="summary-col">
      <h2 class="summary-title" data-i18n="checkoutSummary">Sifarişin Xülasəsi</h2>
      
      <div class="summary-item">
        <span data-i18n="checkoutPlanName">Seçilmiş Plan:</span>
        <strong id="plan-name-display">Basic Plan</strong>
      </div>
      
      <div class="summary-item">
        <span data-i18n="navFeatures">Xüsusiyyətlər:</span>
        <strong id="plan-features-display">300 AI Krediti</strong>
      </div>

      <div class="summary-total">
        <span data-i18n="checkoutTotal">Yekun Məbləğ:</span>
        <span id="plan-price-display">29 AZN</span>
      </div>
    </div>

    <!-- Right: Payment Form -->
    <div class="payment-col">
      <h2 class="payment-title" data-i18n="checkoutPayment">Ödəniş Məlumatları</h2>
      
      <form id="payment-form" onsubmit="handlePayment(event)">
        <div class="form-group">
          <label data-i18n="checkoutCardName">Kart Üzərindəki Ad</label>
          <input type="text" class="form-control" placeholder="Ad Soyad" required>
        </div>
        
        <div class="form-group">
          <label data-i18n="checkoutCardNum">Kartın Nömrəsi</label>
          <input type="text" class="form-control" placeholder="0000 0000 0000 0000" maxlength="19" required>
        </div>
        
        <div class="row">
          <div class="form-group">
            <label data-i18n="checkoutExpiry">Bitmə Tarixi (MM/YY)</label>
            <input type="text" class="form-control" placeholder="12/26" maxlength="5" required>
          </div>
          <div class="form-group">
            <label data-i18n="checkoutCvc">CVC</label>
            <input type="text" class="form-control" placeholder="123" maxlength="3" required>
          </div>
        </div>

        <button type="submit" class="btn-pay" data-i18n="checkoutPayBtn">Ödənişi Təsdiqlə</button>
        
        <div class="secure-badge">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
          <span data-i18n="checkoutSecure">100% Təhlükəsiz Ödəniş (256-bit SSL)</span>
        </div>
      </form>
    </div>
  </div>

  <div id="success-overlay">
    <div class="success-box">
      <div style="width:80px; height:80px; border-radius:50%; background:var(--primary); display:flex; align-items:center; justify-content:center; margin-bottom:24px; box-shadow: 0 10px 25px rgba(109, 40, 217, 0.4);">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
      </div>
      <h3 style="font-size:24px; color:var(--text-main); margin-bottom:24px; font-family:'Manrope';" data-i18n="checkoutSuccess">Ödəniş uğurla tamamlandı! Xidmətiniz aktivləşdirildi.</h3>
      <button class="btn btn-ghost" onclick="window.location.href='index.html'" data-i18n="navHome">Ana Səhifə</button>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  <script src="js/translations.js"></script>
  <script>
    // Animations using GSAP
    gsap.from(".summary-col", { duration: 1, x: -50, opacity: 0, ease: "expo.out", delay: 0.2 });
    gsap.from(".payment-col", { duration: 1, x: 50, opacity: 0, ease: "expo.out", delay: 0.4 });
    gsap.from(".checkout-nav", { duration: 1, y: -50, opacity: 0, ease: "expo.out" });

    // Initialize Dark Theme based on localStorage
    if (localStorage.getItem('theme') === 'dark') {
      document.body.classList.add('dark-theme');
    }

    // Handle Translations
    const lang = localStorage.getItem('lang') || 'az';
    if(translations && translations[lang]) {
      document.querySelectorAll('[data-i18n]').forEach(el => {
        const key = el.getAttribute('data-i18n');
        if (translations[lang][key]) {
          el.innerHTML = translations[lang][key];
        }
      });
      document.documentElement.lang = lang;
    }

    // Handle URL Parameters
    const urlParams = new URLSearchParams(window.location.search);
    const plan = urlParams.get('plan');
    
    const planNameEl = document.getElementById('plan-name-display');
    const planFeaturesEl = document.getElementById('plan-features-display');
    const planPriceEl = document.getElementById('plan-price-display');

    if(plan === 'standard') {
      planNameEl.textContent = 'Standard Plan';
      planFeaturesEl.textContent = translations[lang] ? translations[lang].planCreditsStandard || '1000 AI Krediti' : '1000 AI Krediti';
      planPriceEl.textContent = '59 AZN';
    } else if(plan === 'premium') {
      planNameEl.textContent = 'Premium Plan';
      planFeaturesEl.textContent = translations[lang] ? translations[lang].planCreditsPremium || '2000 AI Krediti' : '2000 AI Krediti';
      planPriceEl.textContent = '99 AZN';
    } else {
      planNameEl.textContent = 'Basic Plan';
      planFeaturesEl.textContent = translations[lang] ? translations[lang].planCreditsBasic || '300 AI Krediti' : '300 AI Krediti';
      planPriceEl.textContent = '29 AZN';
    }

    // Input Formatting (Basic)
    const cardInput = document.querySelectorAll('.form-control')[1];
    cardInput.addEventListener('input', function (e) {
      this.value = this.value.replace(/\D/g, '').replace(/(.{4})/g, '$1 ').trim();
    });

    const expiryInput = document.querySelectorAll('.form-control')[2];
    expiryInput.addEventListener('input', function (e) {
      let v = this.value.replace(/\D/g, '');
      if (v.length >= 2) {
        v = v.substring(0, 2) + '/' + v.substring(2, 4);
      }
      this.value = v;
    });

    // Fake Payment Handling
    function handlePayment(e) {
      e.preventDefault();
      document.getElementById('success-overlay').classList.add('active');
    }

    // 3D Tilt for columns
    const tiltCols = document.querySelectorAll('.summary-col, .payment-col');
    tiltCols.forEach(el => {
      el.addEventListener('mousemove', e => {
        const rect = el.getBoundingClientRect();
        const x = e.clientX - rect.left;
        const y = e.clientY - rect.top;
        const centerX = rect.width / 2;
        const centerY = rect.height / 2;
        const rotateX = ((y - centerY) / centerY) * -5; // max 5 deg tilt
        const rotateY = ((x - centerX) / centerX) * 5;
        
        el.style.transform = `perspective(1500px) scale(1.02) rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;
        el.style.transition = 'none';
        el.style.boxShadow = '0 30px 60px rgba(124, 58, 237, 0.2)';
      });

      el.addEventListener('mouseleave', () => {
        el.style.transition = 'all 0.6s cubic-bezier(0.16, 1, 0.3, 1)';
        el.style.transform = `perspective(1500px) scale(1) rotateX(0deg) rotateY(0deg)`;
        el.style.boxShadow = 'var(--glass-shadow)';
      });
    });
  </script>
</body>
</html>
