<!DOCTYPE html>
<html lang="az">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ReklamAI - Ödəniş</title>
  <link rel="stylesheet" href="css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Manrope:wght@600;800&display=swap" rel="stylesheet">
  <style>
    body {
      background: var(--bg-main);
      color: var(--text-main);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      font-family: 'Inter', sans-serif;
      overflow-x: hidden;
      position: relative;
    }
    
    /* Dedicated Checkout Meshes & Floating 3D Shapes */
    .checkout-mesh-1, .checkout-mesh-2 {
      position: absolute; border-radius: 50%; filter: blur(120px); z-index: -1;
      opacity: 0; pointer-events: none;
    }
    .checkout-mesh-1 {
      width: 800px; height: 800px; background: rgba(124, 58, 237, 0.2);
      top: -200px; left: -200px; animation: floatMeshC 15s infinite alternate ease-in-out;
    }
    .checkout-mesh-2 {
      width: 600px; height: 600px; background: rgba(14, 165, 233, 0.2);
      bottom: -100px; right: -100px; animation: floatMeshC 12s infinite alternate-reverse ease-in-out;
    }
    
    /* True 3D Floating Elements */
    .floating-3d-scene {
      position: absolute;
      top: 20%; right: -15%;
      width: 400px; height: 400px;
      perspective: 1000px;
      z-index: 0;
      opacity: 0.4;
      pointer-events: none;
    }
    .shape-3d {
      width: 100px; height: 100px;
      background: linear-gradient(135deg, rgba(124, 58, 237, 0.5), rgba(14, 165, 233, 0.5));
      border-radius: 30px;
      position: absolute;
      transform-style: preserve-3d;
      animation: spin3D 20s infinite linear;
      box-shadow: 0 0 50px rgba(124, 58, 237, 0.5);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.2);
    }
    .shape-3d:nth-child(1) { top: 10%; left: 10%; animation-duration: 25s; }
    .shape-3d:nth-child(2) { bottom: 20%; right: 20%; width: 150px; height: 150px; border-radius: 50%; animation-duration: 18s; animation-direction: reverse; background: linear-gradient(135deg, rgba(236, 72, 153, 0.3), rgba(124, 58, 237, 0.5)); }
    .shape-3d:nth-child(3) { top: 50%; left: 50%; width: 80px; height: 80px; transform: translateZ(-100px); animation-duration: 15s; }
    
    @keyframes spin3D {
      0% { transform: rotateX(0deg) rotateY(0deg) rotateZ(0deg) translateZ(0); }
      100% { transform: rotateX(360deg) rotateY(360deg) rotateZ(360deg) translateZ(50px); }
    }
    
    @keyframes floatMeshC {
      0% { transform: translate(0, 0) scale(1); }
      100% { transform: translate(50px, 80px) scale(1.1); }
    }

    .checkout-nav {
      padding: 24px 5%; display: flex; justify-content: space-between; align-items: center;
      background: transparent; z-index: 10; opacity: 0; transform: translateY(-50px);
    }
    .nav-brand {
      text-decoration: none; font-size: 26px; font-weight: 800; color: var(--text-main);
      font-family: 'Manrope', sans-serif; display: flex; align-items: center;
      text-shadow: 0 4px 20px rgba(124, 58, 237, 0.2);
    }
    
    .checkout-container {
      display: flex; flex-wrap: wrap; max-width: 1100px; margin: 40px auto; gap: 60px; padding: 0 5%; width: 100%; z-index: 1;
    }
    .summary-col, .payment-col {
      flex: 1; min-width: 320px;
    }
    
    /* Left Column UI */
    .summary-col { opacity: 0; z-index: 2; position: relative; }
    .summary-title { font-family: 'Manrope', sans-serif; font-size: 32px; font-weight: 800; margin-bottom: 40px; background: var(--text-gradient); -webkit-background-clip: text; color: transparent; }
    
    .card-3d-wrapper {
      perspective: 1500px;
      margin-bottom: 40px;
    }

    .premium-card-mockup {
      width: 100%; height: 220px; border-radius: 20px; background: linear-gradient(135deg, rgba(255,255,255,0.08), rgba(255,255,255,0.02));
      backdrop-filter: blur(40px); -webkit-backdrop-filter: blur(40px);
      border: 1px solid rgba(255,255,255,0.15); box-shadow: 0 30px 60px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.2);
      padding: 24px 30px; display: flex; flex-direction: column; justify-content: space-between; position: relative;
      transform-style: preserve-3d; transition: transform 0.1s ease-out, box-shadow 0.4s ease;
    }
    .premium-card-mockup::before {
      content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
      background: radial-gradient(circle at center, rgba(124, 58, 237, 0.2) 0%, transparent 60%);
      transform: translate(-50%, -50%) translateZ(-1px); opacity: 0; transition: opacity 0.5s; pointer-events: none;
    }
    .premium-card-mockup:hover::before { opacity: 1; }
    
    /* True 3D layered elements inside the card */
    .card-chip { width: 45px; height: 35px; background: linear-gradient(135deg, #facc15, #a16207); border-radius: 6px; box-shadow: inset 0 0 5px rgba(0,0,0,0.5), 0 5px 15px rgba(0,0,0,0.2); transform: translateZ(30px); }
    .card-num-display { font-size: 24px; font-family: monospace; letter-spacing: 3px; color: #fff; text-shadow: 0 4px 10px rgba(0,0,0,0.5); margin-top: auto; margin-bottom: 20px; transform: translateZ(40px); }
    .card-btm { display: flex; justify-content: space-between; color: rgba(255,255,255,0.9); font-size: 15px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; transform: translateZ(25px); text-shadow: 0 2px 5px rgba(0,0,0,0.5); }
    
    /* Glowing orb behind the card */
    .card-glow-bg {
      position: absolute; top: 50%; left: 50%; width: 250px; height: 250px; background: var(--primary);
      filter: blur(80px); transform: translate(-50%, -50%) translateZ(-50px); opacity: 0; transition: opacity 0.4s;
    }
    .card-3d-wrapper:hover .card-glow-bg { opacity: 0.5; }
    
    .summary-item { display: flex; justify-content: space-between; margin-bottom: 20px; font-size: 16px; color: var(--text-muted); font-weight: 500; }
    .summary-item strong { color: var(--text-main); font-weight: 600; font-size: 18px; }
    .summary-total { border-top: 1px solid var(--panel-border); margin-top: 32px; padding-top: 32px; display: flex; justify-content: space-between; align-items: center; font-size: 20px; font-weight: 600; color: var(--text-main); }
    .summary-total span:last-child { font-size: 40px; font-weight: 800; color: var(--primary); font-family: 'Manrope', sans-serif; text-shadow: 0 4px 20px rgba(124,58,237,0.3); }
    
    /* Right Column UI */
    .payment-col { background: var(--panel-bg); border: 1px solid var(--panel-border); border-radius: 32px; padding: 48px; box-shadow: var(--glass-shadow); backdrop-filter: blur(30px); opacity: 0; position: relative; overflow: hidden; }
    .payment-title { font-family: 'Manrope', sans-serif; font-size: 26px; font-weight: 800; margin-bottom: 32px; color: var(--text-main); }
    
    .form-group { margin-bottom: 24px; position: relative; }
    .form-group label { display: block; margin-bottom: 10px; font-size: 13px; color: var(--text-muted); font-weight: 600; text-transform: uppercase; letter-spacing: 1px; }
    .form-control { width: 100%; padding: 18px 20px; border-radius: 16px; border: 2px solid var(--panel-border); background: rgba(255, 255, 255, 0.02); color: var(--text-main); font-family: 'Inter', sans-serif; font-size: 16px; font-weight: 500; outline: none; transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1); box-sizing: border-box; }
    .form-control:focus { border-color: var(--primary); background: rgba(124, 58, 237, 0.04); box-shadow: 0 10px 30px rgba(124, 58, 237, 0.15); transform: translateY(-3px); }
    
    .row { display: flex; gap: 20px; }
    .row .form-group { flex: 1; }
    
    .btn-pay { width: 100%; padding: 22px; background: var(--text-gradient); color: white; border: none; border-radius: 16px; font-size: 18px; font-weight: 700; cursor: pointer; transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1); margin-top: 10px; box-shadow: 0 15px 35px rgba(124, 58, 237, 0.4); position: relative; overflow: hidden; }
    .btn-pay::after { content: ''; position: absolute; top: 0; left: -100%; width: 50%; height: 100%; background: linear-gradient(to right, transparent, rgba(255,255,255,0.3), transparent); transform: skewX(-20deg); transition: 0.6s; }
    .btn-pay:hover { transform: translateY(-4px) scale(1.02); box-shadow: 0 25px 45px rgba(124, 58, 237, 0.6); }
    .btn-pay:hover::after { left: 150%; }
    
    .secure-badge { display: flex; align-items: center; justify-content: center; gap: 8px; margin-top: 24px; color: var(--text-muted); font-size: 14px; font-weight: 600; }
    
    /* Overlay */
    #success-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(11,15,25,0.85); backdrop-filter: blur(24px); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 10000; opacity: 0; transition: opacity 0.5s; }
    #success-overlay.active { display: flex; opacity: 1; }
    .success-box { background: var(--panel-bg); padding: 60px 40px; border-radius: 32px; text-align: center; border: 1px solid rgba(124,58,237,0.3); box-shadow: 0 40px 80px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.1); max-width: 450px; transform: scale(0.8) translateY(40px); opacity: 0; transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1); display: flex; flex-direction: column; align-items: center; }
    #success-overlay.active .success-box { transform: scale(1) translateY(0); opacity: 1; }
    
    /* Form Stagger Init */
    .stagger-item, .stagger-item-l { opacity: 0; transform: translateY(20px); }
  </style>
</head>
<body class="dark-theme">

  <div class="checkout-mesh-1"></div>
  <div class="checkout-mesh-2"></div>
  
  <div class="floating-3d-scene">
    <div class="shape-3d"></div>
    <div class="shape-3d"></div>
    <div class="shape-3d"></div>
  </div>

  <nav class="checkout-nav">
    <a href="index.html" class="nav-brand">
      <svg width="36" height="36" viewBox="0 0 48 48" fill="none" style="margin-right:12px;">
        <circle cx="24" cy="24" r="24" fill="var(--primary)" opacity="0.2"/>
        <path d="M14 24 L24 14 V34 Z" fill="var(--primary)" />
        <path d="M24 14 L34 24 L24 34" stroke="var(--accent)" stroke-width="4" stroke-linejoin="round"/>
      </svg>
      ReklamAI
    </a>
  </nav>

  <div class="checkout-container">
    <!-- Left Column -->
    <div class="summary-col">
      <h2 class="summary-title stagger-item-l" data-i18n="checkoutSummary">Sifarişin Xülasəsi</h2>
      
      <div class="card-3d-wrapper stagger-item-l" id="card-wrapper">
        <div class="premium-card-mockup" id="card-mockup">
          <div class="card-glow-bg"></div>
          <div class="card-chip"></div>
          <div class="card-num-display" id="mock-num">**** **** **** ****</div>
          <div class="card-btm">
            <span id="mock-name">AD SOYAD</span>
            <span id="mock-exp">MM/YY</span>
          </div>
        </div>
      </div>
      
      <div class="summary-item stagger-item-l">
        <span data-i18n="checkoutPlanName">Seçilmiş Plan:</span>
        <strong id="plan-name-display">Basic Plan</strong>
      </div>
      <div class="summary-item stagger-item-l">
        <span data-i18n="navFeatures">Xüsusiyyətlər:</span>
        <strong id="plan-features-display">300 AI Krediti</strong>
      </div>
      <div class="summary-total stagger-item-l">
        <span data-i18n="checkoutTotal">Yekun Məbləğ:</span>
        <span id="plan-price-display">29 AZN</span>
      </div>
    </div>

    <!-- Right Column -->
    <div class="payment-col">
      <h2 class="payment-title stagger-item" data-i18n="checkoutPayment">Ödəniş Məlumatları</h2>
      <form id="payment-form" onsubmit="handlePayment(event)">
        <div class="form-group stagger-item">
          <label data-i18n="checkoutCardName">Kart Üzərindəki Ad</label>
          <input type="text" class="form-control" id="in-name" placeholder="Ad Soyad" required>
        </div>
        <div class="form-group stagger-item">
          <label data-i18n="checkoutCardNum">Kartın Nömrəsi</label>
          <input type="text" class="form-control" id="in-num" placeholder="0000 0000 0000 0000" maxlength="19" required>
        </div>
        <div class="row stagger-item">
          <div class="form-group">
            <label data-i18n="checkoutExpiry">Bitmə Tarixi (MM/YY)</label>
            <input type="text" class="form-control" id="in-exp" placeholder="12/26" maxlength="5" required>
          </div>
          <div class="form-group">
            <label data-i18n="checkoutCvc">CVC</label>
            <input type="text" class="form-control" placeholder="123" maxlength="3" required>
          </div>
        </div>
        <button type="submit" class="btn-pay stagger-item" data-i18n="checkoutPayBtn">Ödənişi Təsdiqlə</button>
        <div class="secure-badge stagger-item">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
          <span data-i18n="checkoutSecure">100% Təhlükəsiz Ödəniş (256-bit SSL)</span>
        </div>
      </form>
    </div>
  </div>

  <div id="success-overlay">
    <div class="success-box">
      <div style="width:90px; height:90px; border-radius:50%; background:var(--primary); display:flex; align-items:center; justify-content:center; margin-bottom:30px; box-shadow: 0 15px 35px rgba(124, 58, 237, 0.5);">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
      </div>
      <h3 style="font-size:26px; font-weight:800; color:var(--text-main); margin-bottom:24px; font-family:'Manrope';" data-i18n="checkoutSuccess">Ödəniş uğurla tamamlandı! Xidmətiniz aktivləşdirildi.</h3>
      <button class="btn btn-ghost" style="padding:16px 36px; border-color:var(--primary); color:var(--text-main); font-weight:700;" onclick="window.location.href='index.html'" data-i18n="navHome">Ana Səhifə</button>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  <script src="js/translations.js"></script>
  <script>
    // Theme setup based on index.html
    if (localStorage.getItem('theme') !== 'light') {
      document.body.classList.add('dark-theme');
    } else {
      document.body.classList.remove('dark-theme');
      document.body.classList.add('light-theme');
    }

    // GSAP Timeline Entry Animations (Cinematic)
    const tl = gsap.timeline();
    tl.to(".checkout-nav", { opacity: 1, y: 0, duration: 1.2, ease: "expo.out", delay: 0.2 })
      .to(".checkout-mesh-1, .checkout-mesh-2", { opacity: 1, duration: 2, ease: "power2.inOut" }, "-=1")
      .to(".summary-col", { opacity: 1, duration: 1 }, "-=1.5")
      .fromTo(".stagger-item-l", { opacity: 0, y: 40 }, { opacity: 1, y: 0, duration: 1.2, stagger: 0.1, ease: "expo.out" }, "-=1")
      .to(".payment-col", { opacity: 1, duration: 1 }, "-=1.2")
      .to(".stagger-item", { opacity: 1, y: 0, duration: 1.2, stagger: 0.1, ease: "expo.out" }, "-=1");

    // Translations
    const lang = localStorage.getItem('lang') || 'az';
    if(translations && translations[lang]) {
      document.querySelectorAll('[data-i18n]').forEach(el => {
        const key = el.getAttribute('data-i18n');
        if(translations[lang][key]) el.innerHTML = translations[lang][key];
      });
      document.documentElement.lang = lang;
    }

    // URL Parsing
    const urlParams = new URLSearchParams(window.location.search);
    const plan = urlParams.get('plan');
    const planNameEl = document.getElementById('plan-name-display');
    const planFeaturesEl = document.getElementById('plan-features-display');
    const planPriceEl = document.getElementById('plan-price-display');

    let finalPrice = 29;
    if(plan === 'standard') {
      planNameEl.textContent = 'Standard Plan';
      planFeaturesEl.textContent = translations[lang]?.planCreditsStandard || '1000 AI Krediti';
      finalPrice = 59;
    } else if(plan === 'premium') {
      planNameEl.textContent = 'Premium Plan';
      planFeaturesEl.textContent = translations[lang]?.planCreditsPremium || '2000 AI Krediti';
      finalPrice = 99;
    } else {
      planNameEl.textContent = 'Basic Plan';
      planFeaturesEl.textContent = translations[lang]?.planCreditsBasic || '300 AI Krediti';
      finalPrice = 29;
    }

    // Number Counter Animation for Price
    gsap.fromTo(planPriceEl, { innerHTML: 0 }, { innerHTML: finalPrice, duration: 2.5, ease: "expo.out", snap: { innerHTML: 1 }, onUpdate: function() {
      planPriceEl.innerHTML = this.targets()[0].innerHTML + " AZN";
    }, delay: 0.8 });

    // Form Interactions (Syncing inputs to the glass card mockup)
    const mockup = document.getElementById('card-mockup');
    const inName = document.getElementById('in-name');
    const inNum = document.getElementById('in-num');
    const inExp = document.getElementById('in-exp');
    
    document.querySelectorAll('.form-control').forEach(el => {
      el.addEventListener('focus', () => {
        mockup.style.boxShadow = '0 30px 60px rgba(124, 58, 237, 0.5), inset 0 1px 0 rgba(255,255,255,0.4)';
        mockup.style.borderColor = 'rgba(124, 58, 237, 0.4)';
      });
      el.addEventListener('blur', () => {
        mockup.style.boxShadow = '0 30px 60px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.2)';
        mockup.style.borderColor = 'rgba(255,255,255,0.15)';
      });
    });

    inName.addEventListener('input', e => document.getElementById('mock-name').textContent = e.target.value.toUpperCase() || 'AD SOYAD');
    inNum.addEventListener('input', e => {
      let v = e.target.value.replace(/\D/g, '').replace(/(.{4})/g, '$1 ').trim();
      e.target.value = v;
      document.getElementById('mock-num').textContent = v || '**** **** **** ****';
    });
    inExp.addEventListener('input', e => {
      let v = e.target.value.replace(/\D/g, '');
      if (v.length >= 2) v = v.substring(0, 2) + '/' + v.substring(2, 4);
      e.target.value = v;
      document.getElementById('mock-exp').textContent = v || 'MM/YY';
    });

    // 3D Mouse Tracking for Card Mockup with True Depth
    const leftCol = document.querySelector('.summary-col');
    const wrapper = document.getElementById('card-wrapper');
    // mockup is already declared above
    
    leftCol.addEventListener('mousemove', e => {
      const rect = wrapper.getBoundingClientRect();
      const x = e.clientX - rect.left - rect.width/2;
      const y = e.clientY - rect.top - rect.height/2;
      mockup.style.transform = `rotateX(${-y/10}deg) rotateY(${x/10}deg) scale3d(1.05, 1.05, 1.05)`;
    });
    leftCol.addEventListener('mouseleave', () => {
      mockup.style.transform = `rotateX(0deg) rotateY(0deg) scale3d(1, 1, 1)`;
      mockup.style.transition = `transform 0.6s cubic-bezier(0.16, 1, 0.3, 1), box-shadow 0.4s ease`;
    });
    leftCol.addEventListener('mouseenter', () => {
      mockup.style.transition = `transform 0.1s ease-out, box-shadow 0.4s ease`;
    });

    // Payment Logic
    function handlePayment(e) {
      e.preventDefault();
      document.getElementById('success-overlay').classList.add('active');
    }
  </script>
</body>
</html>
